<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Recommender</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for login form to center it beautifully */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            /* Ensures padding doesn't affect width */
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff7f50;
            background: rgba(255, 255, 255, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
        }

        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: #ff7f50;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .alert {
            padding: 10px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            color: #ffcccc;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            /* Hidden by default */
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="container login-container">
        <h1 id="pageTitle">Welcome Back</h1>
        <p id="pageSubtitle">Login to continue creating your future.</p>

        <div id="alertBox" class="alert"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="interest-btn auth-btn" id="submitBtn">Login</button>
        </form>

        <p class="toggle-text">
            <span id="toggleQuestion">New here?</span>
            <a id="toggleAuthMode">Create an Account</a>
        </p>
    </div>

    <!-- Firebase Scripts (Compatibility Version for easier vanilla JS usage) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <!-- Config and Logic -->
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>

</html>
