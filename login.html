<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NextGen Career AI</title>
    <meta name="description" content="Sign in to NextGen Career AI for personalized career recommendations powered by Google Gemini.">
    <!-- Fonts: Space Grotesk for headings, Outfit for body -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0d12;
            --surface: #14161d;
            --surface-raised: #1c1f29;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --accent: #00d4a0;
            --accent-dim: rgba(0, 212, 160, 0.13);
            --accent-text: #00f5ba;
            --text-primary: #f4f5f7;
            --text-secondary: #9296a3;
            --text-muted: #5c6070;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 1rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .login-header .logo .highlight {
            color: var(--accent);
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .auth-btn {
            width: 100%;
            padding: 0.85rem;
            font-size: 0.95rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            margin-top: 0.5rem;
            background: var(--accent);
            color: #0b0d12;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
        }

        .auth-btn:hover {
            background: var(--accent-text);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 212, 160, 0.25);
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .toggle-text a {
            color: var(--accent-text);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .toggle-text a:hover {
            opacity: 0.8;
        }

        .alert {
            padding: 0.75rem 1rem;
            background: rgba(255, 92, 92, 0.1);
            border: 1px solid rgba(255, 92, 92, 0.3);
            color: #ff8a8a;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            display: none;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 0.75rem;
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">NextGen<span class="highlight">Career</span></div>
            <h1 id="pageTitle">Welcome Back</h1>
            <p id="pageSubtitle">Login to continue creating your future.</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="authForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Login</button>
        </form>

        <p class="toggle-text">
            <span id="toggleQuestion">New here?</span>
            <a id="toggleAuthMode">Create an Account</a>
        </p>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <!-- Config and Logic -->
    <script src="config.js"></script>
    <script src="login.js"></script>
</body>

</html>
