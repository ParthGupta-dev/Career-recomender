<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylish Career Recommender</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>AI Career Recommender</h1>
    <p>Select your interests:</p>
    <div class="interests">
      <button class="interest-btn" data-value="math">Math</button>
      <button class="interest-btn" data-value="coding">Coding</button>
      <button class="interest-btn" data-value="design">Design</button>
      <button class="interest-btn" data-value="writing">Writing</button>
      <button class="interest-btn" data-value="business">Business</button>
      <button class="interest-btn" data-value="ai">AI / ML</button>
      <button class="interest-btn" data-value="finance">Finance</button>
      <button class="interest-btn" data-value="health">Health / Medicine</button>
      <button class="interest-btn" data-value="law">Law</button>
      <button class="interest-btn" data-value="arts">Arts</button>
    </div>
    <button id="recommendBtn">Get Career Recommendation</button>
    <h2 id="result"></h2>
  </div>
  <script src="script.js"></script>
</body>
</html>
